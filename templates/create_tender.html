{% extends "base.html" %}

{% block title %}Create Tender{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create New Tender</h2>
    <form method="POST">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required placeholder="e.g., Office Supplies">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="5" required placeholder="Detailed requirements..."></textarea>
        </div>
        <div class="form-group">
            <label>Deadline</label>
            <input type="date" name="deadline" required>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('buyer_dashboard') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Tender</button>
        </div>
    </form>
</div>
{% endblock %}
